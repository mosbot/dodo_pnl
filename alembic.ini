; Alembic config for pnl-service.
;
; URL читается из app.config.settings.database_url (см. alembic/env.py),
; не отсюда — здесь только пути и формат имени файлов.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

# Имя файла миграции: 0001_initial_schema.py, 0002_add_foo.py
file_template = %%(rev)s_%%(slug)s

# Запретить автоматический drop колонок/таблиц в autogenerate без явного
# подтверждения — лишний слой защиты от случайных миграций.
# (включается доп. проверками в env.py)


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
