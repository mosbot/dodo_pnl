<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вход · P&L Dashboard</title>
<link rel="icon" href="/static/favicon.svg?v=1" type="image/svg+xml">
<link rel="icon" href="/static/favicon-32.png?v=1" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png?v=1">
<link rel="stylesheet" href="/static/styles.css?v=3">
<style>
  body.login-body {
    grid-template-columns: 1fr;
    grid-template-rows: 1fr;
    grid-template-areas: "main";
    background: #f7f8fa;
  }
  body.login-body .login-wrap {
    grid-area: main;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 32px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }
  .login-brand {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .login-brand .muted { font-weight: 400; color: var(--muted); }
  .login-sub {
    font-size: 13px; color: var(--muted);
    margin-bottom: 20px;
  }
  .login-form { display: flex; flex-direction: column; gap: 12px; }
  .login-form label {
    font-size: 12px; font-weight: 600; color: var(--muted);
    display: flex; flex-direction: column; gap: 4px;
  }
  .login-form input {
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    background: white;
  }
  .login-form input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(59,130,246,.15);
  }
  .login-submit {
    margin-top: 8px;
    padding: 10px 16px;
    background: var(--primary);
    color: white;
    border: 1px solid var(--primary);
    border-radius: 6px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
  }
  .login-submit:hover { background: var(--primary-dark); }
  .login-submit:disabled { opacity: 0.5; cursor: wait; }
  .login-error {
    margin-top: 4px;
    font-size: 13px;
    color: var(--danger);
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 6px;
    padding: 8px 10px;
    display: none;
  }
  .login-error.visible { display: block; }
  .login-or { text-align:center; color:var(--muted); font-size:12px; margin:16px 0 10px; }
  .login-sso {
    display:block; text-align:center; padding:10px 16px;
    border:1px solid var(--border); border-radius:6px;
    font-size:14px; font-weight:600; color:var(--text); text-decoration:none;
    background:#fff;
  }
  .login-sso:hover { background: var(--bg); }
</style>
</head>
<body class="login-body">
<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">P&amp;L Dashboard <span class="muted">· PlanFact</span></div>
    <div class="login-sub">Войдите, чтобы получить доступ</div>
    <!-- method=POST + action=# чтобы при неудаче выполнения JS форма всё
         равно НЕ слила пароль в URL через default GET. Реальный submit
         перехватывается JS (login.js, e.preventDefault). -->
    <form id="loginForm" class="login-form" autocomplete="on" method="POST" action="#">
      <label>Логин
        <input type="text" name="username" id="username" required autofocus autocomplete="username">
      </label>
      <label>Пароль
        <input type="password" name="password" id="password" required autocomplete="current-password">
      </label>
      <div id="loginError" class="login-error"></div>
      <button type="submit" id="loginSubmit" class="login-submit">Войти</button>
    </form>
    <div class="login-or">или</div>
    <a href="/auth/sso" class="login-sso">Войти через Dodo IS</a>
    <button type="button" id="ssoRequestBtn" class="login-sso" style="display:none;border:0;cursor:pointer;width:100%">Запросить доступ у администратора</button>
    <div id="ssoRequestMsg" class="login-sub" style="display:none;margin-top:8px"></div>
  </div>
</div>

<script src="/static/login.js?v=2"></script>
<script>
  (function () {
    var p = new URLSearchParams(location.search).get('sso');
    if (!p) return;
    // Вход через Dodo IS выполнен, но аккаунта нет → предлагаем привязать:
    // юзер вводит локальные логин/пароль, форма уходит на /auth/sso-link.
    if (p === 'noaccount') {
      window.__ssoLinkMode = true;
      var sub = document.querySelector('.login-sub');
      if (sub) sub.textContent =
        'Вход через Dodo IS выполнен, но аккаунт ещё не привязан. Есть логин и пароль? Введите их — привяжем Dodo IS к вашему аккаунту.';
      var sb = document.getElementById('loginSubmit');
      if (sb) sb.textContent = 'Привязать и войти';
      var or = document.querySelector('.login-or');
      var sso = document.querySelector('.login-sso');
      if (or) or.style.display = 'none';
      if (sso) sso.style.display = 'none';
      return;
    }
    // Незнакомый Dodo-аккаунт: сеть уже заведена ('request') или нет тенанта
    // ('nosub'). В обоих случаях оставляем форму привязки (вдруг локальный
    // аккаунт уже есть — введите логин/пароль). Для 'request' добавляем кнопку
    // «Запросить доступ» (создаст заявку админу сети).
    if (p === 'request' || p === 'nosub') {
      window.__ssoLinkMode = true;
      var subEl = document.querySelector('.login-sub');
      if (subEl) subEl.textContent = (p === 'request')
        ? 'Вход через Dodo IS выполнен. Есть логин/пароль — введите для привязки. Либо запросите доступ у администратора сети.'
        : 'Вход через Dodo IS выполнен, но подписка на сервис не найдена. Если у вас есть логин/пароль — введите их.';
      var sbtn = document.getElementById('loginSubmit');
      if (sbtn) sbtn.textContent = 'Привязать и войти';
      var or2 = document.querySelector('.login-or');
      var sso2 = document.querySelector('.login-sso');
      if (or2) or2.style.display = 'none';
      if (sso2) sso2.style.display = 'none';
      if (p === 'request') {
        var rb = document.getElementById('ssoRequestBtn');
        var rm = document.getElementById('ssoRequestMsg');
        rb.style.display = 'block';
        rb.addEventListener('click', async function () {
          rb.disabled = true; rb.textContent = 'Отправляем…';
          try {
            var r = await fetch('/auth/access-request', { method: 'POST' });
            var j = await r.json().catch(function(){return {};});
            rm.style.display = 'block';
            if (r.ok && (j.status === 'pending' || j.status === 'linked')) {
              rb.style.display = 'none';
              rm.textContent = j.status === 'linked'
                ? 'Ваш аккаунт уже привязан — просто войдите через Dodo IS.'
                : 'Запрос отправлен администратору сети. Дождитесь подтверждения и войдите снова через Dodo IS.';
            } else {
              rb.disabled = false; rb.textContent = 'Запросить доступ у администратора';
              rm.textContent = (j.detail || 'Не удалось отправить запрос.');
            }
          } catch (e) {
            rb.disabled = false; rb.textContent = 'Запросить доступ у администратора';
          }
        });
      }
      return;
    }
    var msg = {
      nolicense: 'У этого аккаунта Dodo IS нет лицензии на Финансы. Обратитесь к администратору.',
      invalid: 'Сессия Dodo IS недействительна — войдите заново.',
      nosession: 'Войдите через Dodo IS.'
    }[p];
    if (msg) {
      var e = document.getElementById('loginError');
      e.textContent = msg; e.classList.add('visible');
    }
  })();
</script>
</body>
</html>
