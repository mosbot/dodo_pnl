<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вход · P&L Dashboard</title>
<link rel="icon" href="/static/favicon.svg?v=1" type="image/svg+xml">
<link rel="icon" href="/static/favicon-32.png?v=1" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png?v=1">
<link rel="stylesheet" href="/static/styles.css?v=3">
<style>
  body.login-body {
    grid-template-columns: 1fr;
    grid-template-rows: 1fr;
    grid-template-areas: "main";
    background: #f7f8fa;
  }
  body.login-body .login-wrap {
    grid-area: main;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 32px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }
  .login-brand {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .login-brand .muted { font-weight: 400; color: var(--muted); }
  .login-sub {
    font-size: 13px; color: var(--muted);
    margin-bottom: 20px;
  }
  .login-form { display: flex; flex-direction: column; gap: 12px; }
  .login-form label {
    font-size: 12px; font-weight: 600; color: var(--muted);
    display: flex; flex-direction: column; gap: 4px;
  }
  .login-form input {
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    background: white;
  }
  .login-form input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(59,130,246,.15);
  }
  .login-submit {
    margin-top: 8px;
    padding: 10px 16px;
    background: var(--primary);
    color: white;
    border: 1px solid var(--primary);
    border-radius: 6px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
  }
  .login-submit:hover { background: var(--primary-dark); }
  .login-submit:disabled { opacity: 0.5; cursor: wait; }
  .login-error {
    margin-top: 4px;
    font-size: 13px;
    color: var(--danger);
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 6px;
    padding: 8px 10px;
    display: none;
  }
  .login-error.visible { display: block; }
  .login-or { text-align:center; color:var(--muted); font-size:12px; margin:16px 0 10px; }
  .login-sso {
    display:block; text-align:center; padding:10px 16px;
    border:1px solid var(--border); border-radius:6px;
    font-size:14px; font-weight:600; color:var(--text); text-decoration:none;
    background:#fff;
  }
  .login-sso:hover { background: var(--bg); }
</style>
</head>
<body class="login-body">
<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">P&amp;L Dashboard <span class="muted">· PlanFact</span></div>
    <div class="login-sub">Войдите, чтобы получить доступ</div>
    <!-- method=POST + action=# чтобы при неудаче выполнения JS форма всё
         равно НЕ слила пароль в URL через default GET. Реальный submit
         перехватывается JS (login.js, e.preventDefault). -->
    <form id="loginForm" class="login-form" autocomplete="on" method="POST" action="#">
      <label>Логин
        <input type="text" name="username" id="username" required autofocus autocomplete="username">
      </label>
      <label>Пароль
        <input type="password" name="password" id="password" required autocomplete="current-password">
      </label>
      <div id="loginError" class="login-error"></div>
      <button type="submit" id="loginSubmit" class="login-submit">Войти</button>
    </form>
    <div class="login-or">или</div>
    <a href="/auth/sso" class="login-sso">Войти через Dodo IS</a>
    <button type="button" id="ssoRequestBtn" class="login-sso" style="display:none;border:0;cursor:pointer;width:100%">Запросить доступ у администратора</button>
    <div id="ssoRequestMsg" class="login-sub" style="display:none;margin-top:8px"></div>
  </div>
</div>

<script src="/static/login.js?v=3"></script>
</body>
</html>
