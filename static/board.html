<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<!-- iOS Safari auto-link длинных цифр как телефонов — отключаем. -->
<meta name="format-detection"
      content="telephone=no, address=no, email=no, date=no">
<title>Сеть · день · PnL Dashboard</title>
<style>
:root {
  --bg:        #f7f8fa;
  --card:      #ffffff;
  --panel:     #ffffff;
  --border:    #e5e7eb;
  --border-strong: #d1d5db;
  --text:      #1a1f2e;
  --muted:     #6b7280;
  --muted-2:   #767676;  /* было #a3a39e (2.4:1 — провал AA) → ~4.5:1 */
  --primary:   #2563eb;
  --pos:       #15803d;
  --pos-bg:    #ecfdf5;
  --neg:       #b91c1c;
  --neg-bg:    #fef2f2;
  --row-bg:    #f5f7f9;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
html { scrollbar-gutter: stable; }  /* резерв под скроллбар — ширина как на Финансах */
body {
  background: var(--bg);
  color: var(--text);
  /* Шрифт идентичен месячной странице (styles.css) */
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 15px;
  line-height: 1.4;
  /* font-smoothing убран — делал шрифт тоньше чем на месячной */
  font-feature-settings: "tnum" 1, "lnum" 1;
}
a[href^="tel:"], a[href^="sms:"], a[href^="mailto:"] {
  color: inherit;
  text-decoration: none;
  pointer-events: none;
}
.hidden { display: none !important; }

/* Top bar */
.topbar {
  display: flex; align-items: center; gap: 20px;
  padding: 0 20px; min-height: 56px;
  background: white;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  font-size: 14px;
}
.back-btn {
  width: 44px; height: 44px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 8px;
  text-decoration: none; color: var(--text);
  font-size: 22px; flex-shrink: 0;
}
.back-btn:hover { background: rgba(0,0,0,0.04); }
.topbar-title { flex: 1; font-size: 14px; font-weight: 600; }
.topbar-title .muted { color: var(--muted); font-weight: 400; }

/* Платформенный ярус (бренд Dodotool + переключатель сервисов) над topbar */
.app-header { position: sticky; top: 0; z-index: 100; background: white; }
.topbar { position: static; }
.platform-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px; height: 50px;   /* фикс. высота — как на Финансах */
  background: white; border-bottom: 1px solid var(--border);
}
.dt-brand { font-size: 17px; font-weight: 700; letter-spacing: -.3px;
  color: var(--text); text-decoration: none; flex-shrink: 0; }
.dt-brand span { color: #2563eb; }
.pb-spacer { flex: 1 1 auto; }
.svc-switch { position: relative; flex-shrink: 0; }
.svc-chip { display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
  font-family: inherit; font-size: 14px; font-weight: 500; color: #1d4ed8;
  background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 5px 10px; }
.svc-chip:hover { background: #dbeafe; }
.svc-chip-caret { opacity: .65; }
.svc-menu { position: absolute; top: calc(100% + 6px); left: 0; min-width: 200px;
  background: #fff; border: 1px solid var(--border); border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,.12); padding: 6px; z-index: 300; }
.svc-menu.hidden { display: none; }
.svc-item { display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding: 8px 10px; border-radius: 6px; text-decoration: none; color: var(--text); font-size: 14px; }
.svc-item:hover { background: rgba(0,0,0,0.04); }
.svc-item.is-current { color: #1d4ed8; font-weight: 500; }
.svc-item-hub { color: var(--muted); font-size: 13px; }
.svc-menu-sep { height: 1px; background: var(--border); margin: 6px 4px; }
@media (max-width: 640px) {
  .platform-bar { padding: 6px 8px; gap: 8px; }
  .dt-brand { font-size: 16px; }
}
/* Явная кнопка «Обновить» (auto-refresh отключён сознательно —
   rate-limit Dodo IS; «перезагрузите страницу» — слабый affordance). */
.refresh-btn {
  border: 1px solid var(--border); background: white;
  border-radius: 8px; cursor: pointer;
  font-size: 16px; line-height: 1;
  min-width: 36px; min-height: 36px;
  color: var(--text);
}
.refresh-btn:hover { background: rgba(0,0,0,0.04); }
.refresh-btn:disabled { opacity: .45; cursor: default; }
.refresh-btn.spinning { animation: refresh-spin 0.9s linear infinite; }
@keyframes refresh-spin { to { transform: rotate(360deg); } }

/* Page header */
.page-header {
  padding: 18px 16px 12px;
  border-bottom: 1px solid var(--border);
  background: #ffffff;
}
.page-h1 {
  font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
  margin: 0 0 4px; line-height: 1.15;
}
.page-subtitle {
  font-size: 13px; color: var(--muted);
}
.page-subtitle .accent { color: var(--text); font-weight: 500; }
@media (min-width: 720px) {
  .page-header { padding: 24px 24px 16px; }
  .page-h1 { font-size: 26px; }
  .page-subtitle { font-size: 14px; }
}

/* Hero */
.hero { padding: 14px 14px 4px; }
.hero-panels { display: grid; grid-template-columns: 1fr; gap: 8px; }
@media (min-width: 720px) {
  .hero-panels { grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
}
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  display: flex; flex-direction: column; gap: 4px;
}
.panel-label {
  font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted);
}
.panel-main {
  display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
}
.panel-num {
  font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums; line-height: 1.15;
  white-space: nowrap;
}
.panel-num .unit { color: var(--muted); font-weight: 500;
                   font-size: 0.7em; margin-left: 2px; }
.panel-delta {
  font-size: 13px; font-weight: 600;
  padding: 2px 8px; border-radius: 5px;
}
.panel-delta.pos { color: var(--pos); background: var(--pos-bg); }
.panel-delta.neg { color: var(--neg); background: var(--neg-bg); }
.panel-baseline {
  font-size: 11.5px; color: var(--muted);
  font-variant-numeric: tabular-nums;
}
.panel-baseline .method { opacity: 0.7; font-size: 10px; }
@media (min-width: 720px) { .panel-num { font-size: 24px; } }
.panel-channels {
  margin-top: 8px;
  padding-top: 6px;
  border-top: 1px dashed var(--border);
  display: flex; flex-direction: column; gap: 2px;
}
.panel-ch-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 8px;
  align-items: baseline;
  font-variant-numeric: tabular-nums;
  font-size: 12px;
}
.panel-ch-row .pch-name { color: var(--muted); font-size: 11.5px; }
.panel-ch-row .pch-val  { color: var(--muted); text-align: right; }
.panel-ch-row .pch-base {
  /* было --muted-2 (#a3a39e ≈ 2.4:1 — не проходит WCAG AA для мелких
     цифр «vs 184 000» под солнцем); --muted ≈ 5.3:1 */
  color: var(--muted); font-size: 10.5px;
  margin-left: 4px;
}
.panel-ch-row .pch-delta { font-size: 11px; font-weight: 600;
                           min-width: 42px; text-align: right; }
.panel-ch-row .pch-delta.pos { color: var(--pos); }
.panel-ch-row .pch-delta.neg { color: var(--neg); }

/* Section head */
section.cards-wrap { padding: 14px 14px 4px; }

/* Empty-state: ни одной выбранной пиццерии */
.board-empty {
  margin: 48px auto; max-width: 420px; text-align: center;
  padding: 28px 20px; background: #ffffff;
  border: 1px dashed var(--border); border-radius: 14px;
}
.board-empty-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.board-empty-hint { font-size: 13px; color: var(--muted); line-height: 1.5; }
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted); padding: 4px 4px 12px;
  gap: 8px;
}
.section-head .sort-toggle {
  color: var(--text); font-weight: 600;
  text-transform: none; letter-spacing: 0.01em;
  font-size: 12px; background: none;
  border: 1px solid var(--border);
  padding: 8px 12px; min-height: 36px;
  cursor: pointer; border-radius: 6px;
  white-space: nowrap;
}
.section-head .sort-toggle:hover { background: rgba(0,0,0,0.05); }
.section-head .head-actions {
  display: flex; align-items: center; gap: 8px;
}

/* ⚙ Видимость метрик: кнопка + popover */
.metrics-cfg-wrap { position: relative; }
.metrics-cfg-btn {
  width: 36px; height: 36px;
  display: inline-flex; align-items: center; justify-content: center;
  background: none; border: 1px solid var(--border);
  border-radius: 6px; cursor: pointer;
  font-size: 16px; line-height: 1;
  color: var(--text);
}
.metrics-cfg-btn:hover { background: rgba(0,0,0,0.05); }
.metrics-cfg-btn.active {
  background: rgba(37,99,235,0.08);
  border-color: rgba(37,99,235,0.3);
  color: #2563eb;
}
.metrics-cfg-popover {
  position: absolute; top: calc(100% + 6px); right: 0;
  z-index: 30;
  width: 280px; max-width: calc(100vw - 28px);
  background: white;
  border: 1px solid var(--border-strong);
  border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  font-size: 13px;
  text-transform: none; letter-spacing: 0;
  color: var(--text);
}
.metrics-cfg-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
}
.metrics-cfg-close {
  background: none; border: 0; cursor: pointer;
  font-size: 18px; color: var(--muted);
  width: 24px; height: 24px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 4px;
}
.metrics-cfg-close:hover { background: rgba(0,0,0,0.05); color: var(--text); }
.metrics-cfg-body { padding: 10px 12px; max-height: 60vh; overflow-y: auto; }
.metrics-cfg-group-label {
  font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted); font-weight: 700;
  padding: 8px 0 4px;
}
.metrics-cfg-group-label:first-child { padding-top: 2px; }
.metrics-cfg-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 4px; cursor: pointer;
  border-radius: 4px;
}
.metrics-cfg-item:hover { background: rgba(0,0,0,0.03); }
.metrics-cfg-item input[type=checkbox] {
  width: 16px; height: 16px; cursor: pointer; flex-shrink: 0;
}
.metrics-cfg-item .nm { flex: 1; }
.metrics-cfg-item .code {
  color: var(--muted); font-size: 11px; font-family: monospace;
}
.view-switch {
  display: inline-flex; gap: 0;
  background: rgba(0,0,0,0.04);
  border-radius: 8px; padding: 3px;
  font-size: 12px;
}
.view-switch button {
  border: 0; background: transparent; cursor: pointer;
  padding: 6px 10px; border-radius: 6px;
  min-height: 30px; font-family: inherit;
  color: var(--muted); font-weight: 500;
  text-transform: none; letter-spacing: 0;
  transition: background 0.12s, color 0.12s;
}
.view-switch button:hover:not(.active) { color: var(--text); }
.view-switch button.active {
  background: #2563eb; color: white;
  box-shadow: 0 1px 2px rgba(37,99,235,0.25);
}

/* Cards grid */
.cards-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}
@media (min-width: 720px) {
  .cards-grid { grid-template-columns: 1fr 1fr; gap: 14px; }
}
@media (min-width: 1100px) {
  .cards-grid { grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
}
/* NB: блок .card/.card-grid/.row-head/.cell/.card-foot (~100 строк)
   удалён 2026-06-10 — compact-вид давно рендерится через renderCard()
   как .r-card, табличная разметка не генерировалась вовсе (code-review,
   гигиена). */

.page-foot {
  text-align: center; padding: 16px;
  font-size: 11px; color: var(--muted);
}

/* ─── Rich card (детальный вид) ─── */
.rich-grid {
  display: grid; gap: 10px;
  grid-template-columns: 1fr;
}
@media (min-width: 720px) {
  .rich-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
}
@media (min-width: 1280px) {
  .rich-grid { grid-template-columns: 1fr 1fr 1fr; }
}
.r-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  display: flex; flex-direction: column;
}
.r-card.crit { border-left: 3px solid var(--neg); }
.r-card.warn { border-left: 3px solid #b45309; }
.r-card.ok   { border-left: 3px solid var(--pos); }

.r-head {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 14px 16px 4px; gap: 10px;
}
.r-name {
  font-size: 17px; font-weight: 700; letter-spacing: -0.01em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0; flex: 1;
}
.r-head-meta {
  display: inline-flex; align-items: baseline; gap: 8px;
  flex-shrink: 0;
}
.r-month-mini {
  font-size: 12px; color: var(--muted);
  font-variant-numeric: tabular-nums; font-weight: 500;
  white-space: nowrap;
}
.r-month-mini .v { font-weight: 600; }
.r-month-mini.pos .v { color: var(--pos); }
.r-month-mini.neg .v { color: var(--neg); }
.r-month-mini.neutral .v { color: var(--text); }
.r-day-delta {
  font-size: 14px; font-weight: 700;
  padding: 3px 8px; border-radius: 5px;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.r-day-delta.pos { color: var(--pos); background: var(--pos-bg); }
.r-day-delta.neg { color: var(--neg); background: var(--neg-bg); }
.r-day-delta.neutral { color: var(--muted); background: rgba(0,0,0,0.04); }

/* Section label — «День / Месяц / …» внутри карточки */
.r-section-label {
  font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted); font-weight: 700;
  padding: 8px 16px 2px;
}
.r-section-label:first-of-type { padding-top: 4px; }
/* Pill дельты месяца inline в .r-revenue (для «Выручка» view) */
.r-month-delta {
  font-size: 13px; font-weight: 700;
  padding: 2px 7px; border-radius: 5px;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
  margin-left: auto;
}
.r-month-delta.pos { color: var(--pos); background: var(--pos-bg); }
.r-month-delta.neg { color: var(--neg); background: var(--neg-bg); }
.r-month-delta.neutral { color: var(--muted); background: rgba(0,0,0,0.04); }

.r-revenue {
  padding: 4px 16px 4px;
  display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
}
.r-revenue .num {
  font-size: 24px; font-weight: 700; letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.r-revenue .unit { color: var(--muted); font-size: 14px; font-weight: 500; }
.r-revenue .base {
  font-size: 13px; color: var(--muted);
  font-variant-numeric: tabular-nums;
}

.r-channels {
  padding: 0 16px 10px;
  font-size: 13px; color: var(--muted);
  font-variant-numeric: tabular-nums;
}
.r-channels .name { color: var(--muted); }
.r-channels .val { color: var(--text); font-weight: 600; }
.r-channels .d { font-weight: 600; }
.r-channels .d.pos { color: var(--pos); }
.r-channels .d.neg { color: var(--neg); }
.r-channels .d.neutral { color: var(--muted); }
.r-channels .sep { color: var(--muted-2); margin: 0 6px; }

.r-foot {
  padding: 9px 16px 12px;
  border-top: 1px solid var(--border);
  background: #fafafa;
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 8px; font-variant-numeric: tabular-nums;
  margin-top: auto;
}
.r-foot .label {
  font-size: 11.5px; letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--muted); font-weight: 700;
}
.r-foot .vd {
  display: inline-flex; align-items: baseline; gap: 6px;
  font-size: 13px;
}
.r-foot .v { font-weight: 600; color: var(--text); }
.r-foot .d {
  padding: 2px 6px; border-radius: 4px; font-weight: 600; font-size: 12.5px;
}
.r-foot .d.pos { color: var(--pos); background: var(--pos-bg); }
.r-foot .d.neg { color: var(--neg); background: var(--neg-bg); }
.r-foot .d.neutral { color: var(--muted); background: rgba(0,0,0,0.04); }

/* Crit-alert (раскрывающийся) и warn-chips */
.r-card .crit-alert { margin: 0; padding: 0; }
.r-card .crit-alert summary {
  list-style: none;
  padding: 4px 16px 6px;
  cursor: pointer;
  font-size: 13px; color: var(--neg); font-weight: 600;
  display: flex; align-items: center; gap: 6px;
  user-select: none;
}
.r-card .crit-alert summary::-webkit-details-marker { display: none; }
.r-card .crit-alert summary:hover { background: rgba(185,28,28,0.04); }
.r-card .crit-alert summary .sep { color: var(--muted-2); margin: 0 2px; font-weight: 400; }
.r-card .crit-alert summary .chev {
  margin-left: auto; font-size: 10px; color: var(--neg);
  transition: transform 0.15s; opacity: 0.7;
}
.r-card .crit-alert[open] summary .chev { transform: rotate(180deg); }
.r-card .crit-alert-body {
  padding: 2px 16px 8px;
  background: rgba(185,28,28,0.025);
  border-top: 1px dashed #fca5a5;
}
.r-card .crit-sub { padding: 6px 0 4px; }
.r-card .crit-sub + .crit-sub { border-top: 1px dashed rgba(185,28,28,0.15); }
.r-card .crit-sub-label {
  font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--neg); opacity: 0.75; font-weight: 700;
  display: block; padding-bottom: 4px;
}
.r-card .crit-row {
  display: grid; grid-template-columns: minmax(0,1fr) auto;
  gap: 8px; align-items: baseline;
  font-size: 12.5px; font-variant-numeric: tabular-nums;
  padding: 1px 0;
}
.r-card .crit-row .nm { color: var(--text); }
.r-card .crit-row .dur { color: var(--neg); font-weight: 600; font-size: 12px; }

.r-card .warn-chips {
  padding: 0 16px 8px;
  display: flex; gap: 6px; flex-wrap: wrap;
}
.r-card .warn-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px; border-radius: 5px;
  font-size: 12px; font-weight: 600;
  font-variant-numeric: tabular-nums;
  background: #fffbeb; color: #b45309;
  cursor: pointer; list-style: none; user-select: none;
}
.r-card .warn-chip::-webkit-details-marker { display: none; }
.r-card details.warn-details summary { padding: 0; }
.r-card details.warn-details {
  display: inline-flex; flex-direction: column;
  /* details раскрывается «вверх» по содержимому, чтобы не ломать grid */
}
.r-card details.warn-details[open] summary .chev { transform: rotate(180deg); }
.r-card details.warn-details summary .chev {
  font-size: 9px; opacity: 0.7; margin-left: 2px;
  transition: transform 0.15s;
}
.r-card .warn-body {
  margin-top: 6px; padding: 6px 8px;
  background: #fffbeb; border-radius: 6px;
  border: 1px dashed #fcd34d;
  width: 100%;
}
.r-card .warn-body .crit-sub-label { color: #b45309; opacity: 0.8; }
.r-card .warn-body .crit-row .dur { color: #b45309; }

/* ─── История стопов за день (таймлайн) ─── */
.r-card details.stop-hist { margin: 0; padding: 0; border-top: 1px solid var(--border); }
.r-card details.stop-hist summary {
  list-style: none; cursor: pointer; padding: 7px 14px;
  font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px;
}
.r-card details.stop-hist summary::-webkit-details-marker { display: none; }
.r-card details.stop-hist summary:hover { background: rgba(127,127,127,0.05); }
.r-card details.stop-hist .sh-sum { color: var(--text); font-weight: 500; }
.r-card details.stop-hist .sh-sum .sep { color: var(--muted-2); margin: 0 3px; font-weight: 400; }
.r-card details.stop-hist summary .chev {
  margin-left: auto; font-size: 10px; color: var(--muted-2); transition: transform .15s;
}
.r-card details.stop-hist[open] summary .chev { transform: rotate(180deg); }
.r-card .stop-hist-body { padding: 2px 14px 10px; }
.r-card .sh-grp { font-size: 10px; text-transform: uppercase; letter-spacing: .04em;
  color: var(--muted-2); margin: 8px 0 3px; }
.r-card .sh-row {
  display: grid; grid-template-columns: 1fr auto auto; gap: 8px;
  align-items: baseline; padding: 2px 0; font-size: 12px;
}
.r-card .sh-row .sh-nm { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.r-card .sh-row .sh-iv { color: var(--muted); font-variant-numeric: tabular-nums; }
.r-card .sh-row .sh-dur { color: var(--muted); font-weight: 600; font-variant-numeric: tabular-nums; }
.r-card .sh-row.active .sh-dur { color: var(--neg); }
.r-card .sh-row.active .sh-nm::before { content: "● "; color: var(--neg); font-size: 9px; }

/* ─── Ops-grid внутри rich-card ─── */
.r-ops-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-top: 1px solid var(--border);
}
.r-ops-col { padding: 8px 14px 10px; }
.r-ops-col + .r-ops-col { border-left: 1px solid var(--border); }
.r-ops-label {
  font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted); font-weight: 700;
  padding-bottom: 5px;
}
.r-ops-row {
  display: grid;
  /* Фикс-колонки значения/дельты → правые края выровнены в столбцы во
     ВСЕХ строках (auto давал независимую ширину на каждую строку). */
  grid-template-columns: minmax(0,1fr) 52px 58px;
  gap: 8px; align-items: baseline;
  font-size: 13px; font-variant-numeric: tabular-nums;
  padding: 3px 0;
}
.r-ops-row .nm { color: var(--muted); font-size: 12px; }
.r-ops-row .vl { font-weight: 600; text-align: right; }
.r-ops-row .vl .u { color: var(--muted); font-weight: 400; font-size: 11px; }
.r-ops-row .dl { font-weight: 600; font-size: 12px; text-align: right; }
/* Курьеры: значение span на обе правые колонки (текст «5 / 1» шире 52px). */
.r-ops-row.r-courier .vl { grid-column: 2 / -1; }
/* Мобильный: ops-блок в ОДНУ колонку. На 390px две колонки
   «Кухня|Доставка» сжимали зону названия до ~100px — длинные метки
   рвались на 3 строки, значения наезжали. В одну колонку каждой строке
   достаётся вся ширина карточки. Десктоп (>520px) не трогаем. */
@media (max-width: 520px) {
  .r-ops-grid { grid-template-columns: 1fr; }
  .r-ops-col + .r-ops-col {
    border-left: none;
    border-top: 1px solid var(--border);
  }
  .r-ops-row .nm { font-size: 13px; }
  .r-ops-row { padding: 5px 0; }
}
.r-ops-row .dl.pos { color: var(--pos); }
.r-ops-row .dl.neg { color: var(--neg); }
.r-ops-row .dl.neutral { color: var(--muted); }

/* Состояния */
.loading, .error-bar {
  margin: 14px; padding: 14px;
  border-radius: 10px;
  font-size: 13px; text-align: center;
}
.loading { color: var(--muted); background: var(--card);
           border: 1px solid var(--border); }
.error-bar { color: var(--neg); background: var(--neg-bg);
             border: 1px solid var(--neg); }

/* ─── Page mode toggle (День/Месяц/Период) — в topbar /board ─── */
.mode-toggle {
  display: inline-flex; gap: 2px;
  background: rgba(0,0,0,0.04);
  border-radius: 8px; padding: 3px;
  font-size: 13px;
}
.mode-toggle-btn {
  border: 0; background: transparent; cursor: pointer;
  padding: 6px 12px; border-radius: 6px;
  min-height: 30px; font-family: inherit;
  font-size: 13px; font-weight: 500;
  color: var(--muted);
  text-decoration: none; line-height: 1;
  display: inline-flex; align-items: center;
  transition: background 0.12s, color 0.12s;
}
.mode-toggle-btn:hover:not(.is-active) { color: var(--text); }
.mode-toggle-btn.is-active {
  background: #2563eb; color: white;
  box-shadow: 0 1px 2px rgba(37,99,235,0.25);
}
/* ─── Настройки (link as button) + user-menu ─── */
.btn-secondary {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 10px; min-height: 32px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px; font-weight: 500;
  color: var(--text);
  cursor: pointer; text-decoration: none;
  font-family: inherit;
  transition: background-color .12s;
}
.btn-secondary:hover { background: rgba(0,0,0,0.03); }
.user-menu {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 4px 4px 4px 10px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
}
.user-menu.hidden { display: none; }
.user-menu-name {
  color: var(--text); font-weight: 500;
  max-width: 160px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.user-menu-logout {
  padding: 4px 10px;
  font-size: 12px; font-weight: 500;
  color: var(--muted);
  background: transparent;
  border: 1px solid transparent;
  border-radius: 4px;
  cursor: pointer; font-family: inherit;
}
.user-menu-logout:hover {
  color: var(--neg);
  border-color: var(--border);
  background: #fef2f2;
}
.topbar-right {
  margin-left: auto;
  display: inline-flex; align-items: center; gap: 8px;
}

/* ── Узкие экраны (360–640px): topbar в один ряд без переноса.
   Стратегия как на index: прячем brand, имя юзера и текст «Настройки». */
@media (max-width: 640px) {
  /* Уместить топбар на ширину iPhone 13 (390px): прячем бренд и текст,
     поджимаем переключатель режима и кнопки. */
  .topbar { gap: 6px; padding: 0 8px; }
  .brand { display: none; }
  .settings-label { display: none; }
  .user-menu-name { display: none; }
  .mode-toggle { gap: 1px; }
  .mode-toggle-btn { padding: 6px 9px; font-size: 13px; }
  .refresh-btn { min-width: 32px; min-height: 32px; }
  .topbar-right { gap: 4px; }
  .topbar-right .btn-secondary { padding: 6px 8px; }
}

/* ─── Brand ─── */
.brand {
  font-size: 15px; flex-shrink: 0;
  white-space: nowrap;
}
.brand strong { color: var(--text); }
.brand .muted { color: var(--muted); }

/* ─── Drawer (выбор проектов) — всегда overlay ─── */
.drawer-toggle {
  display: inline-flex;  /* всегда виден */
  background: none; border: none;
  cursor: pointer;
  width: 36px; height: 36px;
  align-items: center; justify-content: center;
  border-radius: 6px;
  color: var(--text);
}
.drawer-toggle:hover { background: rgba(0,0,0,0.05); }
.drawer-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.32);
  z-index: 60;
  opacity: 0; pointer-events: none;
  transition: opacity 0.18s ease;
}
body.drawer-open .drawer-backdrop {
  opacity: 1; pointer-events: auto;
}
.drawer-panel {
  position: fixed;
  top: var(--topbar-h, 56px); bottom: 0; left: 0;
  width: min(280px, 80vw);
  z-index: 90;
  background: white;
  border-right: 1px solid var(--border);
  box-shadow: 4px 0 16px rgba(0,0,0,0.12);
  transform: translateX(-100%);
  transition: transform 0.22s ease;
  display: flex; flex-direction: column;
}
body.drawer-open .drawer-panel { transform: translateX(0); }
.drawer-head {
  padding: 16px 16px 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.drawer-head h3 {
  margin: 0;
  font-size: 11px; font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--muted);
}
.drawer-close {
  background: none; border: 0; cursor: pointer;
  width: 28px; height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 20px; color: var(--muted);
  border-radius: 4px;
}
.drawer-close:hover { background: rgba(0,0,0,0.05); color: var(--text); }
.drawer-list {
  flex: 1; overflow-y: auto;
  padding: 0 16px 12px;
}
/* Группа проектов: clickable header с кареткой + счётчик + тумблер */
.proj-group { margin-bottom: 6px; }
.proj-group-head {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 4px;
  font-size: 11px; font-weight: 600;
  color: var(--text);
  text-transform: uppercase; letter-spacing: .3px;
  cursor: pointer;
  user-select: none;
  border-radius: 4px;
}
.proj-group-head:hover { background: rgba(0,0,0,0.03); }
.proj-group-caret {
  display: inline-block; width: 10px; flex-shrink: 0;
  font-size: 10px; color: var(--muted);
}
.proj-group-title {
  flex: 1 1 auto;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.proj-group-count {
  font-weight: 500;
  color: var(--muted);
  font-size: 10px;
  letter-spacing: 0;
}
.proj-group-body { padding-left: 4px; }
.proj-group-body[hidden] { display: none; }
.proj-row {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 4px 4px 24px;
  border-radius: 3px;
  font-size: 12px;
  line-height: 1.3;
  cursor: pointer;
  user-select: none;
}
.proj-row:hover { background: rgba(0,0,0,0.03); }
@media (max-width: 768px) {
  /* Тач-таргет ≥44px: строка целиком кликабельна (label). */
  .proj-row { padding: 11px 8px 11px 24px; min-height: 44px; font-size: 13px; }
}
.proj-row .proj-name {
  flex: 1 1 auto;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text);
}
/* Pill toggle switch — идентичный месячной */
.switch {
  display: inline-block; position: relative;
  width: 28px; height: 16px;
  flex-shrink: 0;
}
.switch input { opacity: 0; width: 0; height: 0; position: absolute; }
.switch .slider {
  position: absolute; inset: 0;
  background: #d1d5db; border-radius: 16px;
  transition: background .15s;
  cursor: pointer;
}
.switch .slider::before {
  content: ""; position: absolute;
  top: 2px; left: 2px; width: 12px; height: 12px;
  background: white; border-radius: 50%;
  transition: transform .15s;
  box-shadow: 0 1px 2px rgba(0,0,0,.2);
}
.switch input:checked + .slider { background: #2563eb; }
.switch input:checked + .slider::before { transform: translateX(12px); }
/* Чтобы клик на тумблер группы не сворачивал группу */
.proj-group-head .switch.js-stop { flex-shrink: 0; }

/* Sticky-bar «Применить» (паттерн как на index, styles.css) —
   тумблеры меняют только staged-выбор, бэк дёргается одной кнопкой. */
.proj-apply-bar {
  position: sticky; bottom: 0;
  background: linear-gradient(to top, white 60%, rgba(255,255,255,0.85));
  padding: 10px 6px 6px;
  margin: 8px 0 0;
  border-top: 1px solid var(--border);
  /* Бар статичный (всегда виден) — иначе юзер не находил «Применить»,
     когда выбор совпадал с применённым. Подсказка-текст и подсветка
     кнопки появляются только при несохранённых изменениях (.dirty). */
  display: flex;
  flex-direction: column; gap: 6px;
  z-index: 10;
}
.proj-apply-bar .bar-text {
  font-size: 11.5px; color: #b45309;
  text-align: center; font-weight: 500;
  visibility: hidden;
}
.proj-apply-bar.dirty .bar-text { visibility: visible; }
.proj-apply-bar:not(.dirty) .btn-apply { opacity: .55; }
.proj-apply-bar .bar-actions { display: flex; gap: 6px; }
.proj-apply-bar button {
  flex: 1; font-size: 12px; padding: 8px 10px; min-height: 36px;
}
.proj-apply-bar .btn-apply {
  background: #2563eb; color: white;
  border: 1px solid #1d4ed8; border-radius: 6px;
  cursor: pointer; font-weight: 500;
}
.proj-apply-bar .btn-apply:hover { background: #1d4ed8; }
.proj-apply-bar .btn-cancel {
  background: white; color: var(--muted);
  border: 1px solid var(--border); border-radius: 6px;
  cursor: pointer;
}
.drawer-foot {
  padding: 10px 16px 14px;
  text-align: center;
  border-top: 1px solid var(--border);
}
.drawer-foot a {
  color: var(--muted);
  font-size: 11px;
  text-decoration: none;
}
.drawer-foot a:hover { color: var(--text); }
</style>
</head>
<body>

<div id="appHeader" class="app-header">
  <!-- Ярус 1 — платформа: бренд + переключатель сервисов + Настройки/юзер -->
  <header class="platform-bar">
    <a class="dt-brand" href="https://app.dodotool.ru" title="Все сервисы Dodotool">Dodo<span>tool</span></a>
    <div class="svc-switch" id="svcSwitch">
      <button type="button" class="svc-chip" id="svcChipBtn" aria-haspopup="true" aria-expanded="false">
        <span class="svc-chip-name">Пульс</span>
        <svg class="svc-chip-caret" viewBox="0 0 12 12" width="12" height="12" aria-hidden="true"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="svc-menu hidden" id="svcMenu" role="menu"></div>
    </div>
    <span class="pb-spacer"></span>
    <a href="/settings" class="btn-secondary" style="text-decoration:none"
       title="Настройки" aria-label="Настройки">⚙<span class="settings-label"> Настройки</span></a>
    <div id="userMenu" class="user-menu hidden">
      <span class="user-menu-name" id="userMenuName">…</span>
      <button id="logoutBtn" class="user-menu-logout" title="Выйти">Выйти</button>
    </div>
  </header>
  <!-- Ярус 2 — панель сервиса (Пульс): день -->
  <header class="topbar">
    <button id="drawerToggle" class="drawer-toggle" type="button"
            aria-label="Открыть проекты" title="Проекты">
      <svg viewBox="0 0 18 18" width="18" height="18" aria-hidden="true">
        <path d="M2 4h14M2 9h14M2 14h14" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" fill="none"/>
      </svg>
    </button>
    <div class="topbar-title" aria-hidden="true"></div>
    <button type="button" id="refreshNowBtn" class="refresh-btn hidden"
            aria-label="Обновить данные" title="Обновить данные">⟳</button>
  </header>
</div>

<div id="drawerBackdrop" class="drawer-backdrop" hidden></div>
<aside id="projectsPanel" class="drawer-panel">
  <div class="drawer-head">
    <h3>Проекты</h3>
    <button type="button" id="drawerCloseBtn" class="drawer-close"
            aria-label="Закрыть">×</button>
  </div>
  <div id="projectsList" class="drawer-list">
    <p style="padding:12px;color:var(--muted)">Загрузка…</p>
  </div>
  <div class="drawer-foot">
    <a href="/settings">Настроить проекты →</a>
  </div>
</aside>

<div id="boardLoading" class="loading">Загружаем данные…</div>
<div id="boardError" class="error-bar hidden" role="alert"></div>

<header class="page-header hidden" id="pageHeader">
  <h1 class="page-h1">Сегодня в сети</h1>
  <p class="page-subtitle" id="pageSubtitle">—</p>
</header>

<section class="hero hidden" id="boardHero">
  <div class="hero-panels">

    <div class="panel">
      <div class="panel-label">День</div>
      <div class="panel-main">
        <span class="panel-num" id="dayNum">—</span>
        <span class="panel-delta" id="dayDelta"></span>
      </div>
      <div class="panel-baseline" id="dayBaseline"></div>
      <div class="panel-channels" id="dayChannels"></div>
    </div>

    <div class="panel">
      <div class="panel-label" id="monthLabel">Месяц LFL</div>
      <div class="panel-main">
        <span class="panel-num" id="monthNum">—</span>
        <span class="panel-delta" id="monthDelta"></span>
      </div>
      <div class="panel-baseline" id="monthBaseline"></div>
      <div class="panel-channels" id="monthChannels"></div>
    </div>

    <div class="panel">
      <div class="panel-label" id="forecastLabel">Прогноз</div>
      <div class="panel-main">
        <span class="panel-num" id="forecastNum">—</span>
        <span class="panel-delta" id="forecastDelta"></span>
      </div>
      <div class="panel-baseline" id="forecastBaseline"></div>
    </div>

  </div>
</section>

<!-- Empty-state: статичный элемент ВНЕ #boardCards — нельзя затирать
     innerHTML секции, внутри живут #cardsGrid/#richGrid. -->
<div id="boardEmpty" class="board-empty hidden" role="status">
  <div class="board-empty-title">Не выбрана ни одна пиццерия</div>
  <div class="board-empty-hint">Откройте меню ☰ слева сверху, отметьте нужные точки и нажмите «Применить».</div>
</div>

<section class="cards-wrap hidden" id="boardCards">
  <div class="section-head">
    <div class="view-switch" id="viewSwitch" role="tablist" aria-label="Вид карточек">
      <button type="button" data-view="rich">Метрики</button>
      <button type="button" data-view="compact">Выручка</button>
    </div>
    <div class="head-actions">
      <button class="sort-toggle" type="button" id="sortToggleBtn">сортировка</button>
      <div class="metrics-cfg-wrap">
        <button class="metrics-cfg-btn" type="button" id="metricsCfgBtn"
                title="Настроить видимость метрик"
                aria-label="Настроить видимость метрик">⚙</button>
        <div class="metrics-cfg-popover hidden" id="metricsCfgPopover">
          <div class="metrics-cfg-head">
            <span>Видимость метрик</span>
            <button type="button" class="metrics-cfg-close"
                    id="metricsCfgCloseBtn" aria-label="Закрыть">×</button>
          </div>
          <div class="metrics-cfg-body" id="metricsCfgBody">
            <p class="muted" style="margin:8px 0">Загрузка…</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="cards-grid" id="cardsGrid"></div>
  <div class="rich-grid hidden" id="richGrid"></div>
</section>

<footer class="page-foot">
  <span id="nextRefresh"></span>
</footer>

<script src="/static/topbar.js?v=27"></script>
<script src="/static/board.js?v=48"></script>
</body>
</html>
