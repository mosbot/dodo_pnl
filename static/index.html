<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>P&L по проектам · PlanFact</title>
<link rel="stylesheet" href="/static/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
</head>
<body>

<div id="loadingBar" class="loading-bar" hidden></div>

<header class="topbar">
  <div class="brand">
    <strong>P&L Dashboard</strong>
    <span class="muted">· PlanFact</span>
  </div>
  <div class="controls">
    <!-- Левый кластер — фиксирован относительно brand. Содержит весь
         «функциональный» контент: переключатель режима, поля выбора
         периода и (только в режиме Месяц) контролы LFL / ⟳ Метрики /
         freshness. Они появляются справа от пикера и «раскрывают»
         левый кластер. -->
    <div class="controls-left">
      <div class="mode-toggle" id="periodModeToggle" role="tablist" aria-label="Режим выбора периода">
        <button type="button" class="mode-toggle-btn is-active" data-mode="month" role="tab" aria-selected="true">Месяц</button>
        <button type="button" class="mode-toggle-btn" data-mode="period" role="tab" aria-selected="false">Период</button>
      </div>
      <label class="tb-field-label" id="monthFieldSingle">
        <span>Месяц</span>
        <select id="monthSelect" class="month-select"></select>
      </label>
      <label class="tb-field-label hidden" id="monthFieldFrom">
        <span>с</span>
        <select id="monthSelectFrom" class="month-select"></select>
      </label>
      <label class="tb-field-label hidden" id="monthFieldTo">
        <span>по</span>
        <select id="monthSelectTo" class="month-select"></select>
      </label>
      <label class="lfl-toggle" id="lflToggleWrap" title="Сравнить с тем же месяцем годом ранее">
        <input type="checkbox" id="compareToggle">
        <span class="lfl-pill">
          <span class="lfl-pill-label">LFL</span>
          <span class="lfl-pill-state">выкл</span>
        </span>
      </label>
      <button id="opsRefreshBtn" class="btn-secondary ops-refresh-btn hidden"
              title="Перетянуть ops-метрики из Dodo IS за выбранный месяц">
        <svg class="ic-refresh" viewBox="0 0 16 16" aria-hidden="true">
          <path d="M14 8a6 6 0 0 1-10.61 3.83" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M2 8a6 6 0 0 1 10.61-3.83" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M14 3v3.5h-3.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 13v-3.5h3.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>Метрики
      </button>
      <span id="opsFreshness" class="ops-freshness hidden"></span>
      <span class="tb-hint hidden" id="tbHintPeriod">
        <span class="tb-hint-arrow">←</span>
        <span class="tb-hint-num">1</span>
        Выбери
      </span>
    </div>
    <!-- Правый кластер — только глобальная навигация: Настройки и юзер-меню.
         Они никогда не двигаются при смене режима. -->
    <div class="controls-right">
      <a href="/settings" class="btn-secondary" style="text-decoration:none;" title="Настройки">⚙ Настройки</a>
      <div id="userMenu" class="user-menu hidden">
        <span class="user-menu-name" id="userMenuName">…</span>
        <button id="logoutBtn" class="user-menu-logout" title="Выйти">Выйти</button>
      </div>
    </div>
  </div>
</header>

<aside id="projectsPanel" class="panel">
  <h3>
    Проекты
    <span class="tb-hint tb-hint-inline hidden" id="sbHintProjects">
      <span class="tb-hint-num">2</span>
      Отметь
    </span>
  </h3>
  <div id="projectsList" class="projects-list"></div>
</aside>

<main class="workspace">

  <section id="kpiCards" class="cards"></section>

  <div class="charts-toolbar">
    <details class="charts-config">
      <summary class="charts-config-trigger" title="Выбрать видимые графики">⚙ Графики</summary>
      <div class="charts-config-popover">
        <div class="charts-config-head">Видимые графики</div>
        <div id="chartsConfigList"></div>
        <div class="charts-config-foot">
          <button type="button" id="chartsConfigShowAll" class="charts-config-btn">Показать все</button>
          <button type="button" id="chartsConfigHideAll" class="charts-config-btn">Скрыть все</button>
        </div>
      </div>
    </details>
  </div>

  <section class="charts" id="chartsGrid">
    <div class="chart-box" data-chart-id="revProfit">
      <h3>Выручка vs Чистая прибыль</h3>
      <div class="chart-wrap"><canvas id="revProfit"></canvas></div>
    </div>
    <div class="chart-box" data-chart-id="margins">
      <h3>Маржинальность по уровням, %</h3>
      <div class="chart-wrap"><canvas id="margins"></canvas></div>
    </div>
    <div class="chart-box" data-chart-id="costShare">
      <h3>Структура затрат, % от выручки</h3>
      <div class="chart-wrap"><canvas id="costShare"></canvas></div>
    </div>
    <div class="chart-box wide" data-chart-id="revHistory12m">
      <h3>Выручка по месяцам · 12 мес</h3>
      <div class="chart-wrap"><canvas id="revHistory12m"></canvas></div>
    </div>
    <div class="chart-box wide" data-chart-id="revHistoryLines">
      <h3>Выручка · линии год к году</h3>
      <div class="chart-wrap"><canvas id="revHistoryLines"></canvas></div>
    </div>
  </section>

  <section class="table-wrap">
    <div class="table-head">
      <h3>Детализация по статьям</h3>
      <button id="pnlExportXlsxBtn" type="button" class="btn-secondary export-btn"
              title="Скачать детализацию в Excel">
        <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
          <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                d="M8 2v8m0 0l-3-3m3 3l3-3M3 12v1.5A1.5 1.5 0 0 0 4.5 15h7a1.5 1.5 0 0 0 1.5-1.5V12"/>
        </svg>
        .xlsx
      </button>
    </div>
    <div class="table-scroll">
      <table id="pnlTable"></table>
    </div>
  </section>

</main>

<!-- Hidden date inputs — драйвятся месячным пикером, нужны drill-down и старому коду -->
<input type="hidden" id="dateStart">
<input type="hidden" id="dateEnd">
<input type="hidden" id="periodMonth">

<!-- Drill-down modal -->
<div id="drillModal" class="modal hidden">
  <div class="modal-content wide">
    <div class="modal-header">
      <h3 id="drillTitle">Операции</h3>
      <div class="modal-header-actions">
        <button id="drillExportXlsxBtn" type="button" class="btn-secondary export-btn"
                title="Скачать список операций в Excel">
          <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
            <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                  d="M8 2v8m0 0l-3-3m3 3l3-3M3 12v1.5A1.5 1.5 0 0 0 4.5 15h7a1.5 1.5 0 0 0 1.5-1.5V12"/>
          </svg>
          .xlsx
        </button>
        <button class="close-btn" data-close>×</button>
      </div>
    </div>
    <div id="drillBody"></div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="/static/topbar.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
